<div class="custom-select" [class.disabled]="disabled" tabindex="0">
  <div class="select-trigger" (click)="toggle()" [class.open]="isOpen()">
    <span class="select-text" [class.placeholder]="isPlaceholder()">
      {{ getDisplayText() }}
    </span>
    <svg class="select-arrow" [class.open]="isOpen()" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>

  @if (isOpen()) {
    <div class="select-dropdown">
      @for (option of options; track option.value; let i = $index) {
        <div
          class="select-option"
          [class.selected]="selectedOption()?.value === option.value"
          [class.highlighted]="highlightedIndex() === i"
          (click)="selectOption(option)"
          (mouseenter)="highlightedIndex.set(i)">
          @if (selectedOption()?.value === option.value) {
            <svg class="option-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <circle cx="12" cy="12" r="4" fill="currentColor"/>
            </svg>
          }
          <span class="option-label">{{ option.label }}</span>
        </div>
      }
    </div>
  }
</div>
